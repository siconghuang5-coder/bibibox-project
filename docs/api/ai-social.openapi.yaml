openapi: 3.0.3
info:
  title: AI Social MVP API
  version: 1.0.0
  description: |
    面向 H5、小程序、`apps/admin`、`apps/ops-admin` 的统一后端接口契约。

    这份文件可直接用于：
    - 前端联调
    - 测试编写接口用例
    - 导入 Apifox / Postman / Swagger UI

    默认本地服务地址：
    - API: `http://127.0.0.1:3100`
    - 绝大多数业务接口带 `/api` 前缀
    - 例外接口：`GET /health`、`POST /auth/wechat`
servers:
  - url: http://127.0.0.1:3100
    description: Local development
tags:
  - name: Health
  - name: Auth
  - name: Notifications
  - name: Social
  - name: Commerce
  - name: Chat
  - name: Admin
paths:
  /health:
    get:
      tags: [Health]
      summary: 健康检查
      operationId: getHealth
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/auth/register:
    post:
      tags: [Auth]
      summary: 用户注册
      operationId: registerAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/auth/login:
    post:
      tags: [Auth]
      summary: 账号密码登录
      operationId: loginAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '201':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/wechat/login:
    post:
      tags: [Auth]
      summary: 微信 code 登录标准接口
      operationId: wechatLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WechatLoginRequest'
      responses:
        '201':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WechatSessionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/wechat:
    post:
      tags: [Auth]
      summary: 微信小程序兼容登录接口
      description: 兼容旧版小程序逻辑，返回结构与标准微信登录类似，额外带 `compatMode`
      operationId: compatWechatLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WechatLoginRequest'
      responses:
        '201':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WechatSessionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: 注销当前 token
      operationId: logoutAccount
      security:
        - BearerAuth: []
      responses:
        '201':
          description: 注销成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/me:
    get:
      tags: [Auth]
      summary: 获取当前会话资料
      operationId: getCurrentSession
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 当前用户资料
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentSessionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/notifications:
    get:
      tags: [Notifications]
      summary: 获取通知列表
      operationId: listNotifications
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 通知列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/notifications/read:
    post:
      tags: [Notifications]
      summary: 批量已读指定通知
      operationId: readNotifications
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationReadRequest'
      responses:
        '201':
          description: 标记成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationReadResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/notifications/read-all:
    post:
      tags: [Notifications]
      summary: 全部通知标记已读
      operationId: readAllNotifications
      security:
        - BearerAuth: []
      responses:
        '201':
          description: 标记成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationReadResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/notifications/unread-count:
    get:
      tags: [Notifications]
      summary: 获取通知未读数
      operationId: getNotificationUnreadCount
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 未读统计
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnreadSummaryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/moments/feed:
    get:
      tags: [Social]
      summary: 获取朋友圈 feed
      operationId: getMomentsFeed
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 朋友圈动态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MomentsFeedResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/square/feed:
    get:
      tags: [Social]
      summary: 获取广场 feed
      operationId: getSquareFeed
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 广场动态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SquareFeedResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/posts:
    post:
      tags: [Social]
      summary: 发布动态
      operationId: createPost
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePostRequest'
      responses:
        '201':
          description: 发布成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostItem'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/uploads/images:
    post:
      tags: [Social]
      summary: 上传社交图片
      operationId: uploadPostImages
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [files]
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: 最多 4 张图片
      responses:
        '201':
          description: 上传成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadImagesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/posts/{postId}:
    get:
      tags: [Social]
      summary: 获取单条动态详情
      operationId: getPostDetail
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '200':
          description: 动态详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/posts/{postId}/comments:
    get:
      tags: [Social]
      summary: 获取动态评论列表
      operationId: listPostComments
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PostId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 评论列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostCommentListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Social]
      summary: 给动态发表评论
      operationId: createPostComment
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PostId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommentRequest'
      responses:
        '201':
          description: 评论成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostComment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/posts/{postId}/like:
    post:
      tags: [Social]
      summary: 点赞或取消点赞
      operationId: togglePostLike
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '201':
          description: 点赞状态变更
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LikeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/comments/{commentId}/reply:
    post:
      tags: [Social]
      summary: 回复评论
      operationId: replyComment
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CommentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommentRequest'
      responses:
        '201':
          description: 回复成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostComment'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/posts/{postId}/mentions:
    post:
      tags: [Social]
      summary: 提及用户
      operationId: mentionUsers
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PostId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MentionUsersRequest'
      responses:
        '201':
          description: 提及成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MentionUsersResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/search/users:
    get:
      tags: [Social]
      summary: 搜索用户或数字人
      operationId: searchUsers
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SearchQ'
      responses:
        '200':
          description: 搜索结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchUsersResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/profiles/{accountId}:
    get:
      tags: [Social]
      summary: 获取用户主页
      operationId: getProfile
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AccountId'
      responses:
        '200':
          description: 主页信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/follows/{accountId}:
    post:
      tags: [Social]
      summary: 关注或取消关注
      operationId: toggleFollow
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AccountId'
      responses:
        '201':
          description: 关注状态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FollowResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/friends/{accountId}/request:
    post:
      tags: [Social]
      summary: 发起好友申请
      operationId: requestFriend
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AccountId'
      responses:
        '201':
          description: 发起成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/friends/{requestId}/accept:
    post:
      tags: [Social]
      summary: 接受好友申请
      operationId: acceptFriend
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RequestId'
      responses:
        '201':
          description: 接受成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/market/home:
    get:
      tags: [Commerce]
      summary: 获取商城首页聚合数据
      operationId: getMarketHome
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 商城首页
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketHomeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/products:
    get:
      tags: [Commerce]
      summary: 获取商品列表
      operationId: listProducts
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductTypeQuery'
        - $ref: '#/components/parameters/SearchQ'
      responses:
        '200':
          description: 商品列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/products/{productId}:
    get:
      tags: [Commerce]
      summary: 获取商品详情
      operationId: getProductDetail
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '200':
          description: 商品详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetailResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/cart:
    get:
      tags: [Commerce]
      summary: 获取购物车
      operationId: getCart
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 购物车
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/cart/items:
    post:
      tags: [Commerce]
      summary: 新增或更新购物车项
      operationId: upsertCartItem
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartItemRequest'
      responses:
        '201':
          description: 更新后的购物车
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/cart/products/{productId}:
    patch:
      tags: [Commerce]
      summary: 修改购物车中某商品数量
      operationId: patchCartItem
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchCartItemRequest'
      responses:
        '200':
          description: 更新后的购物车
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/cart/items/{cartItemId}:
    delete:
      tags: [Commerce]
      summary: 删除购物车项
      operationId: deleteCartItem
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CartItemId'
      responses:
        '200':
          description: 删除后的购物车
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/wallet/recharge:
    post:
      tags: [Commerce]
      summary: 钱包充值
      operationId: rechargeWallet
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RechargeRequest'
      responses:
        '201':
          description: 充值成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletBalance'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/orders/checkout:
    post:
      tags: [Commerce]
      summary: 下单结算
      operationId: checkoutOrder
      security:
        - BearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutRequest'
      responses:
        '201':
          description: 结算成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/orders:
    get:
      tags: [Commerce]
      summary: 获取当前用户订单列表
      operationId: listOrders
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 订单列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/assets:
    get:
      tags: [Commerce]
      summary: 获取当前用户资产页
      operationId: getAssetsDashboard
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 资产页
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetsDashboardResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/chat/conversations:
    get:
      tags: [Chat]
      summary: 获取会话列表
      operationId: listConversations
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 会话列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Chat]
      summary: 确保某个数字人会话存在
      operationId: ensureConversation
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnsureConversationRequest'
      responses:
        '201':
          description: 会话对象
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/chat/conversations/{conversationId}:
    get:
      tags: [Chat]
      summary: 获取会话详情和消息分页
      operationId: getConversationDetail
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ConversationId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: 会话详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationDetailResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/chat/conversations/{conversationId}/messages:
    post:
      tags: [Chat]
      summary: 发送消息
      operationId: sendChatMessage
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ConversationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '201':
          description: 发送成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendMessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/chat/conversations/{conversationId}/read:
    post:
      tags: [Chat]
      summary: 标记会话已读
      operationId: readConversation
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ConversationId'
      responses:
        '201':
          description: 标记成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/chat/unread-summary:
    get:
      tags: [Chat]
      summary: 获取聊天未读汇总
      operationId: getChatUnreadSummary
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 未读统计
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnreadSummaryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/chat/uploads/image:
    post:
      tags: [Chat]
