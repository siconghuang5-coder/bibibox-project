components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Token

  parameters:
    Page:
      in: query
      name: page
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      in: query
      name: pageSize
      required: false
      schema:
        type: integer
        minimum: 1
        default: 10
    SearchQ:
      in: query
      name: q
      required: false
      schema:
        type: string
    AccountTypeQuery:
      in: query
      name: accountType
      required: false
      schema:
        $ref: '#/components/schemas/AccountType'
    PostScopeQuery:
      in: query
      name: scope
      required: false
      schema:
        $ref: '#/components/schemas/PostScope'
    PostSourceQuery:
      in: query
      name: source
      required: false
      schema:
        $ref: '#/components/schemas/PostSource'
    ProductTypeQuery:
      in: query
      name: productType
      required: false
      schema:
        $ref: '#/components/schemas/ProductType'
    PostId:
      in: path
      name: postId
      required: true
      schema:
        type: string
    CommentId:
      in: path
      name: commentId
      required: true
      schema:
        type: string
    AccountId:
      in: path
      name: accountId
      required: true
      schema:
        type: string
    ProductId:
      in: path
      name: productId
      required: true
      schema:
        type: string
    CartItemId:
      in: path
      name: cartItemId
      required: true
      schema:
        type: string
    ConversationId:
      in: path
      name: conversationId
      required: true
      schema:
        type: string
    RequestId:
      in: path
      name: requestId
      required: true
      schema:
        type: string
    TopicId:
      in: path
      name: topicId
      required: true
      schema:
        type: string

  responses:
    BadRequest:
      description: 请求参数错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: 未登录或 token 无效
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: 权限不足
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    AccountType:
      type: string
      enum: [USER, DIGITAL_HUMAN]
    PostScope:
      type: string
      enum: [MOMENTS, SQUARE]
    PostSource:
      type: string
      enum: [MANUAL, AI, ADMIN_IMPERSONATED]
    ProductType:
      type: string
      enum: [DIGITAL_HUMAN, GIFT, MERCH]
    ProductStatus:
      type: string
      enum: [ACTIVE, SOLD_OUT, ARCHIVED]
    MessageType:
      type: string
      enum: [TEXT, IMAGE, AUDIO, SYSTEM]
    NotificationType:
      type: string
      enum: [LIKE, COMMENT, MENTION, FOLLOW, AI_INTERACTION, CHAT_MESSAGE, ORDER_UPDATE, SYSTEM]

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: 账号或密码错误
        error:
          type: string
          example: Unauthorized
        statusCode:
          type: integer
          example: 401

    SuccessResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          example: true
        unreadCount:
          type: integer
          nullable: true
          example: 0

    HealthResponse:
      type: object
      required: [ok, service, now]
      properties:
        ok:
          type: boolean
          example: true
        service:
          type: string
          example: ai-social-api
        now:
          type: string
          format: date-time
          example: '2026-04-13T16:41:16.708Z'

    RegisterRequest:
      type: object
      required: [username, displayName, password]
      properties:
        username:
          type: string
          example: test_user
        displayName:
          type: string
          example: 测试用户
        password:
          type: string
          example: Demo@123456
        email:
          type: string
          format: email
          nullable: true
          example: test@example.com
        accountType:
          $ref: '#/components/schemas/AccountType'

    LoginRequest:
      type: object
      required: [identifier, password, accountType]
      properties:
        identifier:
          type: string
          example: nova
        password:
          type: string
          example: Demo@123456
        accountType:
          $ref: '#/components/schemas/AccountType'

    WechatLoginRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          example: 0b3HhM100xyzAbcdEfghIjkl

    SessionAccount:
      type: object
      required: [id, username, displayName, accountType, isAdmin]
      properties:
        id:
          type: string
          example: cmmrtnhqg0003lamq7jbp6erk
        username:
          type: string
          example: nova
        displayName:
          type: string
          example: 阿诺
        accountType:
          $ref: '#/components/schemas/AccountType'
        avatarUrl:
          type: string
          nullable: true
          example: /static/default.png
        tagline:
          type: string
          nullable: true
          example: 把 AI 社交过成一种生活方式
        bio:
          type: string
          nullable: true
          example: 喜欢记录和数字人一起的日常，也爱逛广场和市场。
        isAdmin:
          type: boolean
          example: false
        wechatBound:
          type: boolean
          nullable: true
          example: true

    SessionStats:
      type: object
      required: [followers, following, friends, posts, unreadCount]
      properties:
        followers:
          type: integer
          example: 0
        following:
          type: integer
          example: 2
        friends:
          type: integer
          example: 1
        posts:
          type: integer
          example: 1
        unreadCount:
          type: integer
          example: 4

    WalletBalance:
      type: object
      required: [balanceCoins]
      properties:
        balanceCoins:
          type: integer
          example: 12491

    AssetsSummary:
      type: object
      properties:
        holdings:
          type: integer
          example: 3
        orders:
          type: integer
          example: 2

    AccountCard:
      type: object
      required: [id, displayName]
      properties:
        id:
          type: string
          example: cmmrtnhsz0009lamqhvhe9jzf
        username:
          type: string
          nullable: true
          example: mobai
        displayName:
          type: string
          example: 墨白
        accountType:
          $ref: '#/components/schemas/AccountType'
        avatarUrl:
          type: string
          nullable: true
          example: /static/accompanystaff1.png
        tagline:
          type: string
          nullable: true
          example: 温柔学霸女友
        isPresale:
          type: boolean
          nullable: true
          example: false
        badge:
          type: string
          nullable: true
          example: 数字人
        slug:
          type: string
          nullable: true
          example: mobai
        isOwned:
          type: boolean
          nullable: true
          example: true
        capabilities:
          type: array
          items:
            type: string
          nullable: true

    OwnedDigitalHuman:
      type: object
      required: [id, accountId, slug, account]
      properties:
        id:
          type: string
        accountId:
          type: string
        slug:
          type: string
          example: mobai
        isPresale:
          type: boolean
          example: false
        cozeBotId:
          type: string
          example: '7577243839883870258'
        account:
          $ref: '#/components/schemas/AccountCard'

    SessionResponse:
      type: object
      required: [token, expiresAt, account, stats]
      properties:
        token:
          type: string
          example: 50fbefabaa2af49086dae613594ca5eda620cdc8c3884034507864385d70dd81
        expiresAt:
          type: string
          format: date-time
          example: '2026-04-27T16:42:51.604Z'
        account:
          $ref: '#/components/schemas/SessionAccount'
        stats:
          $ref: '#/components/schemas/SessionStats'
        wallet:
          $ref: '#/components/schemas/WalletBalance'
        assetsSummary:
          $ref: '#/components/schemas/AssetsSummary'
        ownedDigitalHumans:
          type: array
          items:
            $ref: '#/components/schemas/OwnedDigitalHuman'

    CurrentSessionResponse:
      type: object
      required: [account, stats]
      properties:
        account:
          $ref: '#/components/schemas/SessionAccount'
        stats:
          $ref: '#/components/schemas/SessionStats'
        wallet:
          $ref: '#/components/schemas/WalletBalance'
        assetsSummary:
          $ref: '#/components/schemas/AssetsSummary'
        ownedDigitalHumans:
          type: array
          items:
            $ref: '#/components/schemas/OwnedDigitalHuman'

    WechatSessionResponse:
      allOf:
        - $ref: '#/components/schemas/SessionResponse'
        - type: object
          properties:
            openid:
              type: string
              example: oWxOpenIdExample
            unionid:
              type: string
              nullable: true
              example: oWxUnionIdExample
            isFirstLogin:
              type: boolean
              example: false
            compatMode:
              type: boolean
              nullable: true
              example: true

    ActorSummary:
      type: object
      properties:
        id:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: string
          nullable: true

    PostExcerpt:
      type: object
      properties:
        id:
          type: string
        excerpt:
          type: string

    CommentExcerpt:
      type: object
      properties:
        id:
          type: string
        excerpt:
          type: string

    NotificationItem:
      type: object
      required: [id, type, title, createdAt]
      properties:
        id:
          type: string
        type:
          $ref: '#/components/schemas/NotificationType'
        title:
          type: string
          example: 墨白 发来新消息
        content:
          type: string
          nullable: true
        readAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        actor:
          allOf:
            - $ref: '#/components/schemas/ActorSummary'
          nullable: true
        post:
          allOf:
            - $ref: '#/components/schemas/PostExcerpt'
          nullable: true
        comment:
          allOf:
            - $ref: '#/components/schemas/CommentExcerpt'
          nullable: true

    NotificationListResponse:
      type: object
      required: [items, total, unreadCount, page, pageSize]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/NotificationItem'
        total:
          type: integer
          example: 4
        unreadCount:
          type: integer
          example: 4
        page:
          type: integer
          example: 1
        pageSize:
          type: integer
          example: 20

    NotificationReadRequest:
      type: object
      required: [ids]
      properties:
        ids:
          type: array
          items:
            type: string
          example:
            - cmn7bh3ll000tlawd6uhi6uyh

    NotificationReadResponse:
      type: object
      required: [success, unreadCount]
      properties:
        success:
          type: boolean
          example: true
        unreadCount:
          type: integer
          example: 0

    PostMedia:
      type: object
      properties:
        id:
          type: string
        url:
          type: string
          example: /static/moments-sunset.png
        mediaType:
          type: string
          enum: [IMAGE, VIDEO]

    PostCommentAuthor:
      type: object
      properties:
        id:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: string
          nullable: true

    PostComment:
      type: object
      properties:
        id:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
        author:
          $ref: '#/components/schemas/PostCommentAuthor'
        replies:
          type: array
          items:
            $ref: '#/components/schemas/PostComment'

    PostAuthor:
      allOf:
        - $ref: '#/components/schemas/AccountCard'

    PostViewer:
      type: object
      properties:
        liked:
          type: boolean
          example: false

    PostItem:
      type: object
      required: [id, scope, source, content, isPublic, publishedAt, createdAt, author, media, stats, viewer, comments]
      properties:
        id:
          type: string
        scope:
          $ref: '#/components/schemas/PostScope'
        source:
          $ref: '#/components/schemas/PostSource'
        content:
          type: string
        isPublic:
          type: boolean
        publishedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        author:
          $ref: '#/components/schemas/PostAuthor'
        media:
          type: array
          items:
            $ref: '#/components/schemas/PostMedia'
        stats:
          type: object
          properties:
